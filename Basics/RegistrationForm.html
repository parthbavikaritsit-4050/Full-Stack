<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration From</title>
</head>
<body>

    <h1>Registration From</h1>

    <from> 
        Username:<input type="text" placeholder="Enter Full Name " required><br><br>
        
        Gender:<input type="radio"name="Gender" required>Male
        <input type="radio"name="Gender">Female
        <input type="radio"name="Gender">Other<br><br>
        
        Date Of Birth:<input type="date"><br><br>
        
        Language:<input type="checkbox" checked>Marathi
        <input type="checkbox">Hindi
        <input type="checkbox">English<br><br>

        Country:
        <select required>
            <option>--Select--</option>
            <option>India</option>
            <option>Russia</option>
            <option>USA</option>
            <option>China</option>
            
        </select>

        <br><br>Enter Message:
        <textarea rows="5" cols="40"></textarea><br><br>

        <input type="submit" value="Register">
        

    </from>

    
</body>
</html>
