<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       /* Default Moblle */
       body{
            margin: 10px;
            font-size: 14px;
            background-color: aqua;
        }
        /* Default Mobile */
        body{
            /* margin: 0; */
            background-color: lightblue;
            font-size: 14px;
        }
        /* Tablet */
        @media (min-width: 768px) {
            body{
                background-color: lightcoral;
                font-size: 16px;
            }
        }
        /* Desktop */
        @media (min-width: 1024px) {
            body{
                background-color: lightgreen;
                font-size: 18px;
            }
        }

      


    </style>
</head>
<body>
    <h1>Mobile Frist Apporach</h1>
    <p>In this we make make css considering mobile frist and then adjust for other devices using media query</p>
    
</body>
</html>
