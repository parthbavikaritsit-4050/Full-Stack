<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch Case</title>

    <script>
        let num=prompt("Choose Number Between 1 to 7")

        switch(Number(num)){ //bydefault prmpot stores values in string so converting num to numbers
            case 1:document.write("Today Day is Suanday");break;
            case 2:document.write("Today Day is Monday");break;
            case 3:document.write("Today Day is Tuesday");break;
            case 4:document.write("Today Day is Wedensday");break;
            case 5:document.write("Today Day is Thursday");break;
            case 6:document.write("Today Day is Friday");break;
            case 7:document.write("Today Day is Saturday");break;
            default: document.write("Enter correct number"); 
     }

    </script>
</head>
<body>
    
</body>
</html>
